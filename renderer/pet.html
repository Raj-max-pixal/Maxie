<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAXie Pet</title>
    <link rel="stylesheet" href="pet.css">
  </head>
  <body>
    <div id="petRoot" class="pet-root" aria-label="MAXie desktop pet">
      <div id="worldLayer" class="world-layer" aria-hidden="true"></div>
      <div id="homeLayer" class="home-layer" aria-hidden="true"></div>
      <div id="companionPet" class="companion-pet state-idle" aria-hidden="true">
        <span class="companion-face"></span>
      </div>
      <div id="speechBubble" class="speech-bubble" hidden></div>
      <button id="pet" class="pet state-idle" type="button" aria-label="MAXie">
        <span class="shadow"></span>
        <span class="body">
          <span id="customAvatar" class="custom-avatar"></span>
          <span class="reaction-prop" aria-hidden="true"></span>
          <span class="sparkles" aria-hidden="true"></span>
          <span class="ear left"></span>
          <span class="ear right"></span>
          <span class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="blush left"></span>
            <span class="blush right"></span>
            <span class="mouth"></span>
            <span class="tear"></span>
          </span>
          <span class="arm left"></span>
          <span class="arm right"></span>
          <span class="leg left"></span>
          <span class="leg right"></span>
        </span>
      </button>
      <nav id="quickMenu" class="quick-menu" hidden>
        <button data-action="feed" type="button">Feed</button>
        <button data-action="dance" type="button">Dance</button>
        <button data-action="sleep" type="button">Sleep</button>
        <button data-action="listen" type="button">Listen</button>
        <button data-action="hide" type="button">Hide</button>
        <button data-action="settings" type="button">Settings</button>
      </nav>
    </div>
    <script src="../animations/animationRegistry.js"></script>
    <script src="petBrain.js"></script>
    <script src="petPhysics.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
