name: maxie_mobile
description: MAXie Mobile - India's First AI Mobile Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  glassmorphism: ^3.0.0
  cached_network_image: ^3.3.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # Animations
  lottie: ^3.0.0
  rive: ^0.13.0
  flutter_svg: ^2.0.9

  # AI & Gemini
  google_generative_ai: ^0.4.0
  http: ^1.1.2

  # Firebase
  firebase_core: ^2.24.2

  # Voice
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  permission_handler: ^11.1.0

  # Android Native Features (via platform channels)
  # Accessibility Service, Notification Listener, Media Session
  # Will be implemented in native Android code

  # Battery & System Info
  battery_plus: ^5.0.2
  device_info_plus: ^9.1.1
  flutter_background_service: ^5.0.5

  # Media & Audio
  audio_session: ^0.1.18
  just_audio: ^0.9.36

  # Notifications
  flutter_local_notifications: ^16.3.0


  # Location & Weather
  geolocator: ^10.1.0
  weather: ^3.0.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.18.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  vibration: ^1.8.4
  sensors_plus: ^4.0.2

  # Games
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/lottie/
